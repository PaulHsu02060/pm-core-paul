<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM-Core</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="style.css?v=20260702-3">
</head>
<body>

<!-- ─── LOGIN OVERLAY ─── -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo js-brand-name">PM-Core</div>
    <div class="login-sub">Personal Task Board</div>

    <!-- 純 Google 帳號登入。身分/權限全由後端 Script Properties 判定（SUPERADMIN_EMAIL/ADMIN_EMAILS/ALLOWED_EMAILS/VIEWONLY_EMAILS）；首登密鑰已非前端入口、新站初始化改在 Apps Script 後台設 property，§8f.6 -->
    <div id="loginGoogleMode">
      <div class="login-google-hint">使用 Google 帳號登入</div>
      <div id="gSignInBtn" style="display:flex; justify-content:center; margin-bottom: 14px;"></div>
    </div>
  </div>
</div>

<!-- ─── APP SHELL ─── -->
<div class="app">

  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-mark js-brand-name">PM-Core</div>
      <div class="sb-brand-sub">Personal Task Board</div>
      <div class="sb-user-badge">
        <div class="sb-user-avatar" id="userAvatar">P</div>
        <div>
          <div id="userName">使用者</div>
          <div class="sb-user-mode" id="userMode">EDITOR</div>
        </div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">導覽</div>
      <div class="sb-nav">
        <button class="sb-item active" data-page="workspace" onclick="App.showPage('workspace', this)">
          <span class="ico">▦</span> 個人工作台
        </button>
        <button class="sb-item" data-page="portfolio" onclick="App.showPage('portfolio', this)">
          <span class="ico">▤</span> 全專案總覽
        </button>
      </div>
    </div>

    <div class="sb-section">
      <!-- §19.3：NPI／ECN 兩群標題＋各自新增鈕由 App.renderSidebar() 動態生成 -->
      <div class="sb-proj-list" id="projectList"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">其他</div>
      <div class="sb-nav">
        <button class="sb-item" data-page="report" onclick="App.showPage('report', this)">
          <span class="ico">📋</span> 報告
        </button>
        <button class="sb-item" data-page="settings" onclick="App.showPage('settings', this)">
          <span class="ico">⚙</span> 設定
        </button>
        <button class="sb-item sb-logout" onclick="App.googleSignOut()">
          <span class="ico">⎋</span> 登出
        </button>
      </div>
    </div>

    <div class="sb-bottom">
      <div class="sb-foot">v1.0</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="tb-crumb"><span class="js-brand-name">PM-Core</span> / <b id="crumbPage">個人工作台</b></div>
        <div class="tb-title" id="pageTitle">個人工作台</div>
      </div>
      <div class="tb-spacer"></div>
      <div class="tb-meta-info">
        <span id="weekInfo"></span>
      </div>
      <button class="tb-action" data-edit onclick="App.generateGlobalSchedule()" title="針對所有任務產生本週智慧排程">
        ⚡ 智慧排程
      </button>
    </div>

    <div class="content" id="content">
      <div class="viewonly-banner">
        👁 你目前是「僅檢視」模式。需要編輯請重新整理頁面後登入。
      </div>

      <!-- Pages are rendered dynamically -->
      <div class="page active" id="page-workspace"></div>
      <div class="page" id="page-portfolio"></div>
      <div class="page" id="page-project"></div>
      <div class="page" id="page-gantt"></div>
      <div class="page" id="page-month"></div>
      <div class="page" id="page-report"></div>
      <div class="page" id="page-settings"></div>
      <div class="page" id="page-stage2"></div>
      <div class="page" id="page-stage1"></div>
    </div>
  </main>
</div>

<!-- ─── MODAL CONTAINER ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<!-- ─── CONFIRM OVERLAY（§6.5 塊三：第二層確認框，不覆寫 #modal 表單）─── -->
<div id="confirmOverlay" class="confirm-overlay" style="display:none;"></div>

<!-- ─── TOAST ─── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── CONFIG + SEED 載入順序 ───────────────────────────────
     鐵則：假值模板先載 → .local 真值後載覆蓋 → 最後才 app.js。
     config.local.js / seed.local.js 不進 git；本機不存在時瀏覽器僅
     在 console 印 404（非致命），APP_CONFIG / SEED_* 自動沿用假值 fallback。 -->
<script src="config.js?v=20260701-1"></script>
<script src="config.local.js?v=20260605-1"></script>
<script src="seed.sample.js?v=20260605-1"></script>
<script src="seed.local.js?v=20260605-1"></script>
<script src="templates/product-dev-template.js?v=20260627-1"></script>
<script src="app.js?v=20260702-1"></script>
<script src="portfolio.js?v=20260630-26"></script>
<script src="meeting.js?v=20260630-26"></script>
<script src="settings.js?v=20260701-2"></script>
<script src="schedule.js?v=20260630-26"></script>
<script src="shared-render.js?v=20260630-26"></script>
<script src="report.js?v=20260630-26"></script>
<script src="excel.js?v=20260630-26"></script>
<script src="workspace.js?v=20260630-26"></script>
<script src="project.js?v=20260630-26"></script>
<script src="template.js?v=20260630-26"></script>
</body>
</html>
